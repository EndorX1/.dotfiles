[colors]
; base
bg			= #CC0b0f14
fg			= #E6E6E6
muted			= #A6ADC8
disabled		= #A6ADC8

; surfaces (was #CC1e1e2e and #CC313244)
surface			= #CC141820
surface2		= #CC1B2332

; accents
primary			= #B4BEFE
accent1			= #89B4FA
accent2			= #94E2D5
accent3			= #F5C2E7
green			= #A6E3A1
warn			= #F9E2AF
crit			= #F38BA8

; extra names you referenced elsewhere
black			= #0E1014
cream			= ${colors.fg}
yellow-alt		= #EED49F
red-alt			= #E78284
blue			= ${colors.accent1}
blue-alt		= #7398E6
aqua			= ${colors.accent2}
aqua-alt		= #6BC2B5
alert			= ${colors.crit}
slate			= #4C4F69
lilac2			= #9BA8FD

[bar/main]
monitor = "DisplayPort-1"

width = 100%
height = 18pt
radius = 0

; dpi = 96

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 0 

separator =
separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font:pixelsize=12;0" 
font-1 = "NotoColorEmoji:scale=10"

modules-left = meteo
#modules-left = xkeyboard rofi i3 filesystem kernel memory timer todo wall
#modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth  powermenu xworkspaces
modules-right = gpu cpu memory pulseaudio date powermenu 
modules-center = i3

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true



[bar/second]
monitor = "HDMI-A-0"
width = 100%
height = 18pt
radius = 0

; dpi = 96

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 0 

separator =
separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font:pixelsize=12;0" 
font-1 = "NotoColorEmoji:scale=10"

modules-left = meteo
#modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date powermenu
modules-right = cpu pulseaudio date
modules-center = xworkspaces

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true


[module/timer]
type = custom/script

exec = ~/.config/polybar/script/timer/timer.sh 
tail = true
scroll-up = ~/.config/polybar/script/timer/toggle.sh up
scroll-down = ~/.config/polybar/script/timer/toggle.sh dw 
click-left = ~/.config/polybar/script/timer/toggle.sh start
click-right = ~/.config/polybar/script/timer/toggle.sh 20
label-background	= ${colors.surface}
label-underline		= ${colors.green}
interval = 0.1 

[module/memory]
type = internal/memory
interval = 1 
label = %used%
label-background	= ${colors.surface}
label-underline		= ${colors.green}
label-padding-right = 1
label-padding-left = 1

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt
tray-background		= ${colors.surface}

[module/tray]
type = custom/script
exec = echo "<"
format = <label>
click-left = exec ~/.config/polybar/script/traycollapse

[module/i3]
type = internal/i3

#label-mode-foreground=#4c4f69
#label-mode-background=#a6e3a1

enable-scroll = false
; Only show workspaces defined on the same output as the bar
; Useful if you want to show monitor specific workspaces
; on different bars
; Default: false
pin-workspaces = true
; Show urgent workspaces regardless of whether the workspace is actually hidden 
; by pin-workspaces.
; Default: false
; New in version 3.6.0
show-urgent = true
; This will split the workspace name on ':'
; Default: false
strip-wsnumbers = true
; Sort the workspaces by index instead of the default
; sorting that groups the workspaces by output
; Default: false
index-sort = true
; Create click handler used to focus workspace
; Default: true
enable-click = true
; Use fuzzy (partial) matching on labels when assigning 
; icons to workspaces
; Example: code;‚ôö will apply the icon to all workspaces 
; containing 'code' in the label
; Default: false
fuzzy-match = true
; ws-icon-[0-9]+ = <label>;<icon>
; NOTE: The <label> needs to match the name of the i3 workspace
; Neither <label> nor <icon> can contain a semicolon (;)
ws-icon-0 = 1;1 
ws-icon-1 = Terminal;ÔĄ†  
ws-icon-2 = www;ÔÄā   
ws-icon-3 = Chat;Ôáó   
ws-icon-4 = 4;4  
ws-icon-5 = 5;5
ws-icon-6 = Spotify;ÔÜľ  
ws-icon-7 = 8;8   
ws-icon-8 = 9;9 
ws-icon-9 = 10;10
; NOTE: You cannot skip icons, e.g. to get a ws-icon-6
; you must also define a ws-icon-5.
; NOTE: Icon will be available as the %icon% token inside label-*
; Available tags:
;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
;   <label-mode> (default)
format = <label-state> <label-mode>
; Available tokens:
;   %mode%
; Default: %mode%
label-mode = %mode%
label-mode-padding = 4
; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-focused = %icon%
label-focused-padding = 4
; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-unfocused = %icon%
label-unfocused-padding = 4
; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-visible = %icon%
label-visible-padding = 4
; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-urgent = %icon%
label-urgent-padding = 4
; Separator in between workspaces
label-separator = " "
label-separator-padding = 0
label-mode-background	= ${colors.crit}
label-mode-foreground	= ${colors.cream}
label-focused-foreground= ${colors.black}
label-focused-background= ${colors.yellow-alt}
label-visible-underline	= ${colors.crit}
label-separator-foreground = ${colors.yellow-alt}

[module/xworkspaces]
type = internal/xworkspaces

label-active = Ó©Ī 
#label-active-background = ${colors.bg-alt}
label-active-padding = 1
label-active-foreground	= ${colors.primary}
label-empty-foreground	= ${colors.muted}

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/kernel]
type=custom/script
format-prefix = "  ÔėĽ  "
exec =uname -r 
format-prefix-foreground	= ${colors.black}
format-prefix-background	= ${colors.blue}
label-foreground		= ${colors.black}
label-background		= ${colors.blue-alt}
label-padding-left=2
label-padding-right=2

[module/filesystem]
type = internal/fs
interval = 2
mount-0 = /
format-mounted-prefix = "  ÔĒü  "
format-mounted-prefix-foreground = ${colors.black}
format-mounted-prefix-background = ${colors.aqua}
label-mounted = %free%
label-unmounted =  %mountpoint% not mounted
label-mounted-foreground = ${colors.black}
label-mounted-background = ${colors.aqua-alt}
label-mounted-padding-left=2
label-mounted-padding-right=2

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " ÔÄ® "
format-volume = <label-volume>

label-volume = %percentage%%

label-muted =" ÓĽ®  --% "
label-muted-padding = 0

label-muted-background		= ${colors.surface}
label-muted-underline		= ${colors.crit}
label-volume-background		= ${colors.surface}
label-volume-underline		= ${colors.green}
format-volume-prefix-background	= ${colors.surface}
format-volume-prefix-underline	= ${colors.green}
label-volume-padding = 1

click-right = pavucontrol


[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground	= ${colors.primary}
label-background	= ${colors.surface2}
label-underline		= ${colors.primary}

label-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
label =" Ôíľ %percentage:2%% "
label-background = #CC313244
label-underline = #94e2d5
label-foreground = ${colors.accent2}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d %H:%M:%S

label = %date%
label-background	= ${colors.surface2}
label-underline		= ${colors.primary}
label-padding = 2

[module/powermenu]
type = custom/menu
label-open ="  ÓĽ≠  "
label-separator =
label-open-foreground = #4c4f69
label-open-background = #b4befe
menu-0-0 ="  ÔÄá  "
menu-0-0-exec= i3-msg exit
menu-0-1 ="  ÔÄě  "
menu-0-1-exec = reboot 
menu-0-2 ="  ‚ŹĽ  "
menu-0-2-exec = poweroff


menu-0-0-background = #9ba8fd
menu-0-0-foreground = #4c4f69
menu-0-0-margin = 0
menu-0-1-background = #b4befe
menu-0-1-foreground = #4c4f69
menu-0-2-background = #9ba8fd
menu-0-2-foreground = #4c4f69

label-close = " ÔÖł  "
label-close-background = #CC313244
label-close-foreground = #9ba8fd
label-close-underline = #9ba8fd


[module/pomo]
type = custom/script

exec = ~/.config/polybar/script/pomodoro/pomo.sh
tail = true

label =" %output% "
click-left = ~/.config/polybar/script/pomodoro/toggle.sh
label-background	= ${colors.surface}
label-underline		= ${colors.crit}
interval = 0.1

[module/meteo]
type = custom/script
label = " %output% "
exec = ~/.config/polybar/script/meteo.sh
interval = 1800
label-background	= ${colors.surface}
label-underline		= ${colors.green}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/gpu]
type			= custom/script
exec			= ~/.config/polybar/script/amdgpu.sh
interval		= 2
tail			= false
format			= <label>
label			= "ůįĘģ %output%"
label-foreground	= ${colors.accent3}
label-background	= ${colors.surface}
label-underline		= ${colors.accent3}
label-padding-left	= 1
label-padding-right	= 1

; vim:ft=dosini
